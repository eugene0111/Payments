# Continuous Integration
name: Build on PR

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Install Dependancies
        run: npm install

      - name: Run Build
        run: npm run build
